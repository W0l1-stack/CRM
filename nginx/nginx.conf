events {
    worker_connections 1024;
}

http {
    # Single entry point. The browser talks to one URL; Nginx routes:
    #   /api/  -> Go API        (data operations)
    #   /rt/   -> Node service  (Socket.io real-time + webhooks)
    #   /      -> React frontend
    upstream go_api {
        server backend-go:3001;
    }
    upstream node_rt {
        server backend-node:3002;
    }
    upstream frontend {
        server frontend:3000;
    }

    server {
        listen 80;
        server_name _;

        # Go API
        location /api/ {
            proxy_pass http://go_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
        }

        # Node real-time service (WebSocket upgrade)
        location /rt/ {
            proxy_pass http://node_rt;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # React frontend (dev server has its own HMR websocket)
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
